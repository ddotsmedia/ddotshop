services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ddotsshop
      POSTGRES_PASSWORD: ddotsshop
      POSTGRES_DB: ddotsshop
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ddotshop-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ddotsshop"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redisdata:/data
    networks:
      - ddotshop-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ddotshop:latest
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ddotsshop:ddotsshop@postgres:5432/ddotsshop
      REDIS_URL: redis://redis:6379
      RUN_MIGRATIONS: "1"
    ports:
      - "3050:3000"
    networks:
      - ddotshop-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD","node","-e","fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
  workers:
    image: ddotshop:latest
    restart: always
    command: ["sh", "-c", "npx tsx workers/index.ts"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ddotsshop:ddotsshop@postgres:5432/ddotsshop
      REDIS_URL: redis://redis:6379
    networks:
      - ddotshop-net
    depends_on:
      app:
        condition: service_healthy
networks:
  ddotshop-net:
    driver: bridge
volumes:
  pgdata:
    name: ddotshop_pgdata
  redisdata:
    name: ddotshop_redisdata
